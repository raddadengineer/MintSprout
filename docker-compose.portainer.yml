version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mintsprout-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mintsprout
      POSTGRES_USER: mintsprout
      POSTGRES_PASSWORD: mintsprout_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mintsprout:
    image: raddadengineer/mintsprout:latest
    container_name: mintsprout-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://mintsprout:mintsprout_password@postgres:5432/mintsprout
      JWT_SECRET: my_secure_jwt_secret_example
      ALLOWED_ORIGINS: http://localhost:8080,http://127.00.1:8080
    ports:
      - "8080:5000"
    depends_on:
      - postgres
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
  app_logs:
